name: Vault-AI CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest python-dotenv cryptography numpy

      - name: Run tests
        run: pytest tests/test_encryption.py tests/test_differential_privacy.py -v
        env:
          GROQ_API_KEY: dummy_key
          GROQ_MODEL: llama-3.3-70b-versatile
          DP_EPSILON: "1.0"
          CHROMA_PERSIST_DIR: /tmp/chroma_data
          VAULT_DATA_DIR: /tmp/vault_data
          MLFLOW_TRACKING_URI: file:/tmp/mlruns

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t vault-ai .
