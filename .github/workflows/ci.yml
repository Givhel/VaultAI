name: Vault-AI CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest python-dotenv cryptography numpy

      - name: Run tests
        run: pytest tests/ -v --ignore=tests/test_pii_detector.py --ignore=tests/test_tokenizer.py
        env:
          GROQ_API_KEY: dummy_key_for_testing
          GROQ_MODEL: llama-3.3-70b-versatile
          DP_EPSILON: "1.0"
          CHROMA_PERSIST_DIR: /tmp/chroma_data
          VAULT_DATA_DIR: /tmp/vault_data
          MLFLOW_TRACKING_URI: file:/tmp/mlruns

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t vault-ai .name: Vault-AI CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest python-dotenv cryptography numpy

      - name: Run tests
        run: pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t vault-ai .
